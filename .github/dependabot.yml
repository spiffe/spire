version: 2
updates:
- package-ecosystem: gomod
  directory: "/"
  schedule:
    interval: "daily"
    time: "09:00"
    timezone: "America/Los_Angeles"
  # Wait for new releases to age before opening update PRs. Since
  # Dependabot patch/minor updates are auto-merged once CI passes,
  # the cooldown preserves a window for the ecosystem to detect and
  # report compromised releases before they can land unattended.
  cooldown:
    default-days: 7
  groups:
    actions:
      patterns:
        - "github.com/actions/*"
    aws-sdk:
      patterns:
        - "github.com/aws/aws-sdk-go-v2/*"
        - "github.com/aws/smithy-go"
    azure-sdk:
      patterns:
        - "github.com/Azure/azure-sdk-for-go/*"
    google-cloud-sdk:
      patterns:
        - "cloud.google.com/go/*"
        - "google.golang.org/api"
        - "google.golang.org/grpc"
        - "github.com/googleapis/*"
    golang.org/x:
      patterns:
        - "golang.org/x/*"
    hashicorp-vault:
      patterns:
        - "github.com/hashicorp/vault/*"
    k8s.io:
      patterns:
        - "k8s.io/*"
    sigs.k8s.io:
      patterns:
        - "sigs.k8s.io/*"
  ignore:
  - dependency-name: "github.com/spiffe/spire-api-sdk"
  - dependency-name: "github.com/spiffe/spire-plugin-sdk"
  # go-sqlite3 v2 is not the latest release. See the repo for more information.
  - dependency-name: "github.com/mattn/go-sqlite3"
    versions: ["2.x"]
  - dependency-name: "github.com/aws/aws-sdk-go-v2*"
    update-types: ["version-update:semver-patch"]
  - dependency-name: "cloud.google.com/go/*"
    update-types: ["version-update:semver-patch"]
  open-pull-requests-limit: 20
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
   interval: daily
  # Let new action releases age before opening update PRs, so that a
  # compromised release has a window to be detected and reported by the
  # ecosystem before it is proposed for review (e.g. the March 2025
  # tj-actions/changed-files compromise was reverted within days).
  cooldown:
    default-days: 7
  open-pull-requests-limit: 20

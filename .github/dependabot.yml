version: 2
updates:
- package-ecosystem: gomod
  directory: "/"
  schedule:
    interval: "weekly"
    time: "09:00"
    timezone: "America/Los_Angeles"
  # Wait for new releases to age before opening update PRs, preserving
  # a window for the ecosystem to detect and report a compromised
  # release before it is proposed for review.
  cooldown:
    default-days: 7
  # Collapse all minor and patch updates into a single weekly PR.
  # Major updates remain ungrouped so each breaking change can be
  # reviewed independently.
  groups:
    minor-and-patch:
      patterns:
        - "*"
      update-types:
        - "minor"
        - "patch"
  ignore:
  - dependency-name: "github.com/spiffe/spire-api-sdk"
  - dependency-name: "github.com/spiffe/spire-plugin-sdk"
  # go-sqlite3 v2 is not the latest release. See the repo for more information.
  - dependency-name: "github.com/mattn/go-sqlite3"
    versions: ["2.x"]
  - dependency-name: "github.com/aws/aws-sdk-go-v2*"
    update-types: ["version-update:semver-patch"]
  - dependency-name: "cloud.google.com/go/*"
    update-types: ["version-update:semver-patch"]
  open-pull-requests-limit: 20
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  # Wait for new action releases to age before opening update PRs, so
  # that a compromised release has a window to be detected and reported
  # by the ecosystem before it is proposed for review (e.g. the March
  # 2025 tj-actions/changed-files compromise was reverted within days).
  cooldown:
    default-days: 7
  groups:
    minor-and-patch:
      patterns:
        - "*"
      update-types:
        - "minor"
        - "patch"
  open-pull-requests-limit: 20

run:
  # timeout for analysis, e.g. 30s, 5m, default is 1m
  timeout: 12m

issues:
  exclude-dirs:
    - testdata$
    - test/mock
  exclude-files:
    - ".*\\.pb\\.go$"
  exclude-rules:
    - linters: [ staticcheck ]
      path: ".*_test\\.go$"
      text: "Subjects has been deprecated since Go 1\\.18.*Subjects will not include the system roots"

linters:
  enable:
    - bodyclose
    - durationcheck
    - errorlint
    - goimports
    - revive
    - gosec
    - misspell
    - nakedret
    - unconvert
    - unparam
    - whitespace
    - gocritic
    - nolintlint

linters-settings:
  revive:
    # minimal confidence for issues, default is 0.8
    confidence: 0.0
    rules:
      - name: unused-parameter
        disabled: true
  gosec:
    excludes:
      - G115 # "Potential integer overflow when converting between integer types"; TODO re-enable eventually

server {
	bind_address = "0.0.0.0"
	bind_port = "8081"
	trust_domain = "domain.test"
	data_dir = "/opt/spire/data/server"
	log_level = "DEBUG"
	ca_ttl = "1h"
	default_x509_svid_ttl = "15s"

	experimental {
		allow_pluggable_datastore = true
	}
}

plugins {
    DataStore "cassandra" {
        max_grpc_message_size = 1000000000 # 1GB

        plugin_data {
            hosts = ["host.docker.internal:9044", "host.docker.internal:9045", "host.docker.internal:9046"]
            keyspace = "spire"
            read_consistency = "LOCAL_QUORUM"
            write_consistency = "QUORUM"
            skip_migrations = false
            replication_strategy = "NetworkTopologyStrategy"
            network_topology_strategy_replication_factors = {
                "dc1" = "3"
            }
            simple_strategy_replication_factor = 1
            max_connection_attempts = 10
            driver_log_level = "DEBUG"
            connect_timeout_ms = "10000"
            read_timeout_ms = "10000"
            write_timeout_ms = "11000"

            username = "cassandra"
            password = "cassandra"
        }
    }
	NodeAttestor "x509pop" {
		plugin_data {
			ca_bundle_path = "/opt/spire/conf/server/agent-cacert.pem"
		}
	}
	KeyManager "memory" {
		plugin_data = {}
	}
}

# ConfigMap containing the SPIRE server configuration.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-server
  namespace: spire
data:
  server.conf: |
    server {
      bind_address = "0.0.0.0"
      bind_port = "8081"
      trust_domain = "example.org"
      data_dir = "/run/spire/data"
      log_level = "DEBUG"
      default_x509_svid_ttl = "1h"
      ca_ttl = "12h"
      ca_subject {
        country = ["US"]
        organization = ["SPIFFE"]
        common_name = ""
      }

      experimental {
        allow_pluggable_datastore = true
      }
    }

    plugins {
      DataStore "cassandra" {
        max_grpc_message_size = 1000000000 # 1GB

        plugin_data {
          hosts = ["172.17.0.1:9044", "172.17.0.1:9045", "172.17.0.1:9046"]
          keyspace = "spire"
          read_consistency = "LOCAL_QUORUM"
          write_consistency = "QUORUM"
          skip_migrations = false
          replication_strategy = "NetworkTopologyStrategy"
          network_topology_strategy_replication_factors = {
              "dc1" = "3"
          }
          simple_strategy_replication_factor = 1
          max_connection_attempts = 10
          driver_log_level = "DEBUG"
          connect_timeout_ms = "10000"
          read_timeout_ms = "10000"
          write_timeout_ms = "11000"

          username = "cassandra"
          password = "cassandra"
        }
      }

      NodeAttestor "k8s_psat" {
        plugin_data {
          clusters = {
            "example-cluster" = {
              service_account_allow_list = ["spire:spire-agent"]
            }
          }
        }
      }

      KeyManager "disk" {
        plugin_data {
          keys_path = "/run/spire/data/keys.json"
        }
      }
    
      UpstreamAuthority "vault" {
        plugin_data {
          vault_addr="http://vault.vault.svc:8200/"
          token_auth {}
        }
      }

      Notifier "k8sbundle" {
        plugin_data {
          # This plugin updates the bundle.crt value in the spire:spire-bundle
          # ConfigMap by default, so no additional configuration is necessary.
        }
      }
    }

    health_checks {
      listener_enabled = true
      bind_address = "0.0.0.0"
      bind_port = "8080"
      live_path = "/live"
      ready_path = "/ready"
    }

services:
  spire-server:
    image: spire-server:latest-local
    hostname: spire-server
    volumes:
      - ./conf/server:/opt/spire/conf/server
    command: ["-config", "/opt/spire/conf/server/server.conf"]
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

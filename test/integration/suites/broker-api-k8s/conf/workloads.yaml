---
# Broker allowed to use KubernetesObjectReference over the local UDS only.
# Its object references must be rejected over the TCP broker listener because
# allow_over_tcp is not set for that reference type.
apiVersion: v1
kind: Pod
metadata:
  name: local-only-object-broker
  namespace: spire
  labels:
    app: local-only-object-broker
spec:
  hostPID: true
  nodeName: broker-api-k8s-worker
  containers:
    - name: local-only-object-broker
      image: broker-client:latest-local
      imagePullPolicy: Never
      command: ["/bin/sleep", "infinity"]
      volumeMounts:
        - name: spire-agent-socket
          mountPath: /run/spire/agent-sockets
          readOnly: false
        - name: spire-broker-socket
          mountPath: /run/spire/broker-sockets
          readOnly: false
  volumes:
    - name: spire-agent-socket
      hostPath:
        path: /run/spire/agent-sockets
        type: Directory
    - name: spire-broker-socket
      hostPath:
        path: /run/spire/broker-sockets
        type: Directory

---
# The "restricted broker" — authorized in the agent config but limited to
# WorkloadPIDReference only. KubernetesObjectReference attempts should be
# rejected with PermissionDenied at the gRPC layer.
apiVersion: v1
kind: Pod
metadata:
  name: restricted-broker
  namespace: spire
  labels:
    app: restricted-broker
spec:
  hostPID: true
  nodeName: broker-api-k8s-worker
  containers:
    - name: restricted-broker
      image: broker-client:latest-local
      imagePullPolicy: Never
      command: ["/bin/sleep", "infinity"]
      volumeMounts:
        - name: spire-agent-socket
          mountPath: /run/spire/agent-sockets
          readOnly: false
        - name: spire-broker-socket
          mountPath: /run/spire/broker-sockets
          readOnly: false
  volumes:
    - name: spire-agent-socket
      hostPath:
        path: /run/spire/agent-sockets
        type: Directory
    - name: spire-broker-socket
      hostPath:
        path: /run/spire/broker-sockets
        type: Directory

---
# The "RBAC denied broker" is authorized by the Broker API config to use
# KubernetesObjectReference, but its broker SPIFFE ID is not allowed to use
# `impersonate-via-spire` by the Kubernetes authorizer.
apiVersion: v1
kind: Pod
metadata:
  name: rbac-denied-broker
  namespace: spire
  labels:
    app: rbac-denied-broker
spec:
  hostPID: true
  nodeName: broker-api-k8s-worker
  containers:
    - name: rbac-denied-broker
      image: broker-client:latest-local
      imagePullPolicy: Never
      command: ["/bin/sleep", "infinity"]
      volumeMounts:
        - name: spire-agent-socket
          mountPath: /run/spire/agent-sockets
          readOnly: false
        - name: spire-broker-socket
          mountPath: /run/spire/broker-sockets
          readOnly: false
  volumes:
    - name: spire-agent-socket
      hostPath:
        path: /run/spire/agent-sockets
        type: Directory
    - name: spire-broker-socket
      hostPath:
        path: /run/spire/broker-sockets
        type: Directory

---
# The "unauthorized workload" — gets its own SVID via the Workload API just
# fine, but isn't in the agent's broker allowlist. Attempts to dial the
# broker endpoint should fail at the mTLS layer.
apiVersion: v1
kind: Pod
metadata:
  name: unauthorized-workload
  namespace: spire
  labels:
    app: unauthorized-workload
spec:
  hostPID: true
  nodeName: broker-api-k8s-worker
  containers:
    - name: unauthorized-workload
      image: broker-client:latest-local
      imagePullPolicy: Never
      command: ["/bin/sleep", "infinity"]
      volumeMounts:
        - name: spire-agent-socket
          mountPath: /run/spire/agent-sockets
          readOnly: false
        - name: spire-broker-socket
          mountPath: /run/spire/broker-sockets
          readOnly: false
  volumes:
    - name: spire-agent-socket
      hostPath:
        path: /run/spire/agent-sockets
        type: Directory
    - name: spire-broker-socket
      hostPath:
        path: /run/spire/broker-sockets
        type: Directory

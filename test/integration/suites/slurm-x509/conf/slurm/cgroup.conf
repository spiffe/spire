# cgroup/v2 on the host. The host's systemd + dbus create the slurmstepd scope.
CgroupPlugin=cgroup/v2

# We only need the job/step cgroup hierarchy for attestation, not resource
# confinement. Disabling constraints avoids needing specific controllers to be
# delegated and avoids OOM-killing the job given the tiny RealMemory.
ConstrainCores=no
ConstrainRAMSpace=no
ConstrainDevices=no

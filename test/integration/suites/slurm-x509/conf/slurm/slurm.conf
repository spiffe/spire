# Minimal single-node Slurm config for the slurm-x509 integration suite.
# NODENAME is substituted with the host's short hostname by 00-setup.
ClusterName=cluster
SlurmctldHost=NODENAME

SlurmUser=slurm
AuthType=auth/munge

SlurmctldPort=6817
SlurmdPort=6818

StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SlurmctldPidFile=/run/slurmctld.pid
SlurmdPidFile=/run/slurmd.pid
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# cgroup/v2 process tracking + task confinement. This produces the
# .../slurmstepd.scope/job_<id>/step_<x>/... hierarchy the slurm attestor matches.
ProctrackType=proctrack/cgroup
TaskPlugin=task/cgroup

SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

MpiDefault=none
ReturnToService=2

# Single node. CPUs/RealMemory are deliberately at/under real capacity so the
# node never drains for "Low CPUs"/"Low RealMemory".
NodeName=NODENAME CPUs=1 RealMemory=100 State=UNKNOWN
PartitionName=debug Nodes=ALL Default=YES MaxTime=INFINITE State=UP
